name: Mantener Supabase Activo
on:
  schedule:
    # Lunes y jueves a las 12:00 UTC (09:00 AM hora de Argentina).
    # Dos veces por semana da margen frente al límite de 7 días.
    - cron: '0 12 * * 1,4'
  workflow_dispatch:        # Permite ejecutarlo manualmente desde la pestaña Actions.

# Necesario para que el paso de auto-mantenimiento pueda commitear.
permissions:
  contents: write

jobs:
  ping_db:
    runs-on: ubuntu-latest
    steps:
      # Necesario para el paso final (auto-mantenimiento por commit).
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Insertar ping (escritura real en la base)
        run: |
          echo "Insertando ping en keep_alive..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{}')
          echo "Codigo HTTP del INSERT: $HTTP_CODE"
          if [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: el INSERT no devolvio 201. Revisa los secrets y las politicas RLS."
            exit 1
          fi
          echo "Ping insertado correctamente."
      - name: Limpiar pings de mas de 30 dias
        run: |
          echo "Borrando pings antiguos..."
          curl -s -o /dev/null -w "Limpieza HTTP: %{http_code}\n" \
            -X DELETE "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive?ping=lt.$(date -u -d '30 days ago' '+%Y-%m-%dT%H:%M:%S')" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
          echo "Listo."

      # GitHub deshabilita los workflows programados tras 60 días sin
      # actividad en el repo. Este paso hace un commit automático (solo
      # cada ~45 días, no en cada corrida) para que el cron no se apague.
      - name: Evitar que GitHub deshabilite el workflow (60 días)
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: false
          time_elapsed: '45'         
